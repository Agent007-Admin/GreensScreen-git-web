<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>GSE Type A — Game Clip Intro</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Share+Tech+Mono&display=swap" rel="stylesheet"/>
<style>
  :root {
    --g: #00ff88; --a: #aaff44; --dk: #050a07; --tx: #e8f5ee; --mu: #6b9a7a;
    --fd: 'Bebas Neue', sans-serif; --fm: 'Share Tech Mono', monospace;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #0a0f0b; display: flex; flex-direction: column; align-items: center; gap: 32px; padding: 40px 24px; font-family: var(--fm); }

  .label { color: var(--mu); font-size: 9px; letter-spacing: 3px; text-transform: uppercase; margin-bottom: 8px; }

  /* ── SHARED CANVAS ── */
  .canvas { position: relative; overflow: hidden; background: #020804; }
  .c169 { width: 640px; height: 360px; }
  .c916 { width: 202px; height: 360px; }

  /* ── SLASH SCROLL LAYER ── */
  .slash-track {
    position: absolute; inset: 0; z-index: 1;
    overflow: hidden;
  }
  /* multiple diagonal bands that scroll */
  .slash-band {
    position: absolute;
    top: -200%; left: -50%;
    width: 200%; height: 400%;
    background: repeating-linear-gradient(
      115deg,
      transparent 0px,
      transparent 80px,
      rgba(0,255,136,0.045) 80px,
      rgba(0,255,136,0.09) 100px,
      transparent 100px,
      transparent 180px
    );
    animation: slashScroll 8s linear infinite;
  }
  .slash-band-2 {
    position: absolute;
    top: -200%; left: -50%;
    width: 200%; height: 400%;
    background: repeating-linear-gradient(
      115deg,
      transparent 0px,
      transparent 140px,
      rgba(0,255,136,0.03) 140px,
      rgba(0,255,136,0.06) 155px,
      transparent 155px,
      transparent 280px
    );
    animation: slashScroll 12s linear infinite reverse;
  }
  @keyframes slashScroll {
    0%   { transform: translateY(0); }
    100% { transform: translateY(25%); }
  }

  /* ── GRID ── */
  .grid {
    position: absolute; inset: 0; z-index: 2; pointer-events: none;
    background-image:
      linear-gradient(rgba(0,255,136,0.035) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,255,136,0.035) 1px, transparent 1px);
    background-size: 40px 40px;
  }

  /* ── RADIAL GLOW that breathes ── */
  .glow-breath {
    position: absolute; z-index: 2; pointer-events: none;
    border-radius: 50%;
    background: radial-gradient(ellipse, rgba(0,255,136,0.12) 0%, transparent 70%);
    animation: breathe 3s ease-in-out infinite;
  }
  @keyframes breathe {
    0%, 100% { opacity: 0.6; transform: scale(1); }
    50%       { opacity: 1;   transform: scale(1.15); }
  }

  /* ── GLITCH BARS ── */
  .glitch-bar {
    position: absolute; z-index: 3; height: 2px;
    background: linear-gradient(to right, transparent, var(--g), transparent);
    animation: glitchMove 6s ease-in-out infinite;
  }
  .glitch-bar-2 {
    position: absolute; z-index: 3; height: 1.5px;
    background: linear-gradient(to right, transparent, rgba(0,255,136,0.5), transparent);
    animation: glitchMove2 9s ease-in-out infinite;
  }
  @keyframes glitchMove {
    0%   { opacity: 0; transform: translateX(-30px); }
    10%  { opacity: 0.5; }
    40%  { opacity: 0.4; transform: translateX(20px); }
    50%  { opacity: 0; }
    100% { opacity: 0; transform: translateX(-30px); }
  }
  @keyframes glitchMove2 {
    0%   { opacity: 0; }
    20%  { opacity: 0; transform: translateX(40px); }
    35%  { opacity: 0.3; transform: translateX(-10px); }
    50%  { opacity: 0; }
    100% { opacity: 0; }
  }

  /* ── CORNER MARKS ── */
  .corner-tl {
    position: absolute; top: 16px; left: 16px; z-index: 10;
    width: 22px; height: 22px;
    border-top: 2px solid rgba(0,255,136,0.7);
    border-left: 2px solid rgba(0,255,136,0.7);
    animation: cornerPulse 4s ease-in-out infinite;
  }
  .corner-br {
    position: absolute; bottom: 28px; right: 16px; z-index: 10;
    width: 22px; height: 22px;
    border-bottom: 1.5px solid rgba(0,255,136,0.3);
    border-right: 1.5px solid rgba(0,255,136,0.3);
    animation: cornerPulse 4s ease-in-out infinite 0.5s;
  }
  @keyframes cornerPulse {
    0%, 100% { opacity: 0.6; }
    50%       { opacity: 1; }
  }

  /* ── CATEGORY PILL ── */
  .cat-pill {
    position: absolute; z-index: 20;
    font-family: var(--fm); font-size: 9px; letter-spacing: 2.5px;
    text-transform: uppercase;
    background: rgba(0,255,136,0.15); color: var(--g);
    padding: 5px 16px; border: 1px solid rgba(0,255,136,0.4);
    clip-path: polygon(6px 0%,100% 0%,calc(100% - 6px) 100%,0% 100%);
    animation: fadeSlideDown 0.8s ease forwards;
  }
  @keyframes fadeSlideDown {
    from { opacity: 0; transform: translateY(-8px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* ── LIVE INDICATOR ── */
  .live-ind {
    position: absolute; z-index: 20;
    display: flex; align-items: center; gap: 6px;
    font-family: var(--fm); font-size: 9px; letter-spacing: 2px; color: var(--g);
  }
  .sdot {
    width: 7px; height: 7px; border-radius: 50%; background: var(--g);
    box-shadow: 0 0 8px rgba(0,255,136,1);
    animation: dotPulse 1.5s ease-in-out infinite;
  }
  @keyframes dotPulse {
    0%, 100% { box-shadow: 0 0 6px rgba(0,255,136,0.9); transform: scale(1); }
    50%       { box-shadow: 0 0 16px rgba(0,255,136,1); transform: scale(1.3); }
  }

  /* ── MAIN TITLE ── */
  .main-title {
    position: absolute; z-index: 15;
    font-family: var(--fd); line-height: 0.88; letter-spacing: 4px;
    animation: titleReveal 0.9s cubic-bezier(0.22,1,0.36,1) forwards 0.3s;
    opacity: 0;
  }
  @keyframes titleReveal {
    from { opacity: 0; transform: translateX(-20px); }
    to   { opacity: 1; transform: translateX(0); }
  }
  .t-line1 { display: block; color: var(--g); text-shadow: 0 0 30px rgba(0,255,136,0.6); }
  .t-line2 { display: block; color: var(--tx); }
  .t-sub   { display: block; color: var(--a); font-size: 0.42em; letter-spacing: 6px; margin-top: 5px; }

  /* ── FADE OUT OVERLAY ── */
  .fade-out {
    position: absolute; inset: 0; z-index: 50; pointer-events: none;
    background: #020804;
    animation: fadeToBlack 1s ease forwards 2.8s;
    opacity: 0;
  }
  @keyframes fadeToBlack {
    from { opacity: 0; }
    to   { opacity: 1; }
  }

  /* ── LOGO BUG ── */
  .logo-bug {
    position: absolute; z-index: 20;
    display: flex; flex-direction: column; align-items: flex-end; gap: 2px;
    animation: fadeSlideDown 1s ease forwards 0.6s; opacity: 0;
  }
  .lb-text { font-family: var(--fd); font-size: 14px; letter-spacing: 2px; color: var(--g); text-shadow: 0 0 12px rgba(0,255,136,0.5); line-height: 1; }
  .lb-text s2 { color: rgba(232,245,238,0.75); }
  .lb-text em { font-style: normal; color: var(--a); }
  .lb-line { width: 100%; height: 1px; background: linear-gradient(to left, var(--g), transparent); }
  .lb-sub  { font-family: var(--fm); font-size: 6.5px; letter-spacing: 1.5px; color: rgba(107,154,122,0.8); }

  /* ── SCANLINES ── */
  .scanlines {
    position: absolute; inset: 0; z-index: 40; pointer-events: none;
    background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,0,0,0.04) 2px, rgba(0,0,0,0.04) 3px);
  }

  /* ── TOP/BOT BARS ── */
  .tbar { position: absolute; top: 0; left: 0; right: 0; height: 1px; z-index: 20; background: linear-gradient(to right, rgba(0,255,136,0.6), transparent); }
  .bbar { position: absolute; bottom: 0; left: 0; right: 0; height: 3px; z-index: 20; background: linear-gradient(to right, var(--g), var(--a), transparent); }

  /* ── REPLAY ── */
  .replay-btn {
    font-family: var(--fm); font-size: 9px; letter-spacing: 2px; color: var(--g);
    background: transparent; border: 1px solid rgba(0,255,136,0.3);
    padding: 6px 18px; cursor: pointer; text-transform: uppercase;
    clip-path: polygon(6px 0%,100% 0%,calc(100% - 6px) 100%,0% 100%);
    transition: all 0.15s; margin-top: 6px;
  }
  .replay-btn:hover { background: rgba(0,255,136,0.1); border-color: var(--g); }
</style>
</head>
<body>

<!-- ── 16:9 ── -->
<div>
  <div class="label">Type A · Game Clip Intro · 16:9 Desktop (fades to black at 3s)</div>
  <div class="canvas c169" id="canvas-a169">
    <!-- slash scroll -->
    <div class="slash-track">
      <div class="slash-band"></div>
      <div class="slash-band-2"></div>
    </div>
    <!-- grid -->
    <div class="grid"></div>
    <!-- glow -->
    <div class="glow-breath" style="width:400px;height:280px;top:-40px;right:40px;"></div>
    <!-- glitch bars -->
    <div class="glitch-bar" style="top:82px;left:0;width:220px;opacity:0.45;"></div>
    <div class="glitch-bar-2" style="top:90px;left:60px;width:100px;"></div>
    <!-- corner marks -->
    <div class="corner-tl"></div>
    <div class="corner-br"></div>
    <!-- category pill -->
    <div class="cat-pill" style="top:16px;left:16px;">GAME CLIP</div>
    <!-- live indicator -->
    <div class="live-ind" style="top:16px;right:90px;"><span class="sdot"></span>LIVE CAPTURE</div>
    <!-- main title -->
    <div class="main-title" style="bottom:52px;left:20px;font-size:68px;">
      <span class="t-line1">INSANE</span>
      <span class="t-line2">MOMENT</span>
      <span class="t-sub">GREENS.SCREENS</span>
    </div>
    <!-- logo bug -->
    <div class="logo-bug" style="bottom:16px;right:16px;">
      <div class="lb-text"><span style="color:var(--g)">GREENS</span><s2> SCREENS</s2><em> ENT</em></div>
      <div class="lb-line"></div>
      <div class="lb-sub">greensscreensent.com</div>
    </div>
    <!-- bars -->
    <div class="tbar"></div>
    <div class="bbar"></div>
    <div class="scanlines"></div>
    <!-- fade to black -->
    <div class="fade-out" id="fo-a169"></div>
  </div>
  <button class="replay-btn" onclick="replay('canvas-a169','fo-a169')">↺ Replay</button>
</div>

<!-- ── 9:16 ── -->
<div>
  <div class="label">Type A · Game Clip Intro · 9:16 Shorts / Reels</div>
  <div class="canvas c916" id="canvas-a916">
    <div class="slash-track">
      <div class="slash-band" style="background:repeating-linear-gradient(135deg,transparent 0px,transparent 60px,rgba(0,255,136,0.045) 60px,rgba(0,255,136,0.09) 76px,transparent 76px,transparent 136px);"></div>
      <div class="slash-band-2" style="animation-duration:14s;"></div>
    </div>
    <div class="grid" style="background-size:28px 28px;"></div>
    <div class="glow-breath" style="width:220px;height:320px;top:-30px;right:-20px;"></div>
    <div class="glitch-bar" style="top:100px;left:0;width:130px;opacity:0.45;"></div>
    <div class="glitch-bar-2" style="top:106px;left:30px;width:70px;"></div>
    <div class="corner-tl" style="width:16px;height:16px;top:12px;left:12px;"></div>
    <div class="cat-pill" style="top:12px;left:12px;font-size:7px;padding:3px 12px;">CLIP</div>
    <div class="live-ind" style="top:12px;right:10px;font-size:7px;gap:4px;"><span class="sdot" style="width:5px;height:5px;"></span>LIVE</div>
    <div class="main-title" style="bottom:50px;left:12px;font-size:44px;letter-spacing:3px;">
      <span class="t-line1">INSANE</span>
      <span class="t-line2">MOMENT</span>
      <span class="t-sub" style="font-size:0.38em;letter-spacing:4px;">GREENS.SCREENS</span>
    </div>
    <div class="logo-bug" style="bottom:12px;right:10px;">
      <div class="lb-text" style="font-size:10px;"><span style="color:var(--g)">GSE</span></div>
      <div class="lb-line"></div>
    </div>
    <div class="tbar"></div>
    <div class="bbar"></div>
    <div class="scanlines"></div>
    <div class="fade-out" id="fo-a916"></div>
  </div>
  <button class="replay-btn" onclick="replay('canvas-a916','fo-a916')">↺ Replay</button>
</div>

<script>
function replay(canvasId, foId) {
  // restart animations by cloning
  const canvas = document.getElementById(canvasId);
  const fo = document.getElementById(foId);

  // reset fade out
  fo.style.animation = 'none';
  fo.offsetHeight;
  fo.style.animation = 'fadeToBlack 1s ease forwards 2.8s';

  // restart slash bands
  canvas.querySelectorAll('.slash-band, .slash-band-2').forEach(el => {
    el.style.animation = 'none';
    el.offsetHeight;
    el.style.animation = '';
  });

  // restart title
  canvas.querySelectorAll('.main-title').forEach(el => {
    el.style.animation = 'none';
    el.offsetHeight;
    el.style.animation = 'titleReveal 0.9s cubic-bezier(0.22,1,0.36,1) forwards 0.3s';
  });

  // restart logo bug
  canvas.querySelectorAll('.logo-bug').forEach(el => {
    el.style.animation = 'none';
    el.offsetHeight;
    el.style.animation = 'fadeSlideDown 1s ease forwards 0.6s';
  });
}
</script>
</body>
</html>
