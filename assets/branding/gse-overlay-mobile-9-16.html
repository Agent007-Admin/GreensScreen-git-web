<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>GSE Overlay — Mobile 9:16 (Minimal)</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Rajdhani:wght@400;600;700&family=Share+Tech+Mono&display=swap" rel="stylesheet"/>
<style>
  /* =============================================
     GSE MINIMAL OVERLAY — 9:16 VERTICAL
     1080 × 1920 — TikTok / Reels / Shorts / LIVE
     OBS Browser Source: 1080 x 1920

     Top-left:  pulsing LIVE badge (toggleable) + GREENS.SCREENS
     Top-right: GREENS SCREENS ENT watermark + URL
  ============================================= */

  :root {
    --gs-green:   #00ff88;
    --gs-accent:  #aaff44;
    --gs-dark:    #050a07;
    --gs-text:    #e8f5ee;
    --gs-muted:   #6b9a7a;
    --gs-border:  rgba(0,255,136,0.25);
    --fd: 'Bebas Neue', sans-serif;
    --fb: 'Rajdhani', sans-serif;
    --fm: 'Share Tech Mono', monospace;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    width: 1080px;
    height: 1920px;
    background: transparent;
    overflow: hidden;
    position: relative;
  }

  /* Demo background — preview only, with ?demo=1 */
  body.demo {
    background:
      radial-gradient(ellipse at 30% 25%, #1a2f3f 0%, transparent 55%),
      radial-gradient(ellipse at 75% 70%, #2a1f3f 0%, transparent 50%),
      linear-gradient(160deg, #0d1620 0%, #131a26 45%, #0a0f16 100%);
  }

  @keyframes appear {
    from { opacity: 0; transform: translateY(-8px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* =============================================
     TOP LEFT — LIVE badge + GREENS.SCREENS
  ============================================= */
  .brand-unit {
    position: absolute;
    top: 60px;
    left: 44px;
    z-index: 30;
    display: flex;
    align-items: center;
    gap: 18px;
    opacity: 0;
    animation: appear 0.8s ease forwards 0.4s;
  }

  .live-badge {
    display: inline-flex;
    align-items: center;
    gap: 12px;
    font-family: var(--fm);
    font-size: 22px;
    letter-spacing: 5px;
    font-weight: bold;
    color: var(--gs-dark);
    background: var(--gs-green);
    text-transform: uppercase;
    padding: 11px 24px 11px 18px;
    border-radius: 6px;
    animation: live-glow 2s ease-in-out infinite;
  }

  @keyframes live-glow {
    0%, 100% { box-shadow: 0 0 12px rgba(0,255,136,0.55), 0 0 30px rgba(0,255,136,0.25); }
    50%      { box-shadow: 0 0 26px rgba(0,255,136,0.95), 0 0 60px rgba(0,255,136,0.45); }
  }

  .live-dot {
    width: 12px;
    height: 12px;
    border-radius: 50%;
    background: var(--gs-dark);
    position: relative;
    flex-shrink: 0;
  }
  .live-dot::after {
    content: '';
    position: absolute;
    inset: -5px;
    border-radius: 50%;
    border: 2px solid var(--gs-dark);
    opacity: 0.5;
    animation: dot-ping 2s ease-out infinite;
  }
  @keyframes dot-ping {
    0%   { transform: scale(0.5); opacity: 0.7; }
    80%  { transform: scale(1.4); opacity: 0; }
    100% { transform: scale(1.4); opacity: 0; }
  }

  /* LIVE hidden by default — toggle on for streams */
  body.live-off .live-badge { display: none; }

  .brand-logo {
    font-family: var(--fd);
    font-size: 52px;
    letter-spacing: 4px;
    line-height: 1;
    color: var(--gs-text);
    text-shadow: 0 2px 14px rgba(0,0,0,0.85), 0 0 4px rgba(0,0,0,0.9);
    white-space: nowrap;
  }
  .brand-logo .h {
    color: var(--gs-green);
    text-shadow: 0 0 24px rgba(0,255,136,0.6), 0 2px 10px rgba(0,0,0,0.8);
  }

  /* =============================================
     TOP RIGHT — GSE ENT watermark
     GREENS + ENT in primary green, SCREENS off-white
  ============================================= */
  .corner-watermark {
    position: absolute;
    top: 64px;
    right: 44px;
    z-index: 30;
    display: flex;
    flex-direction: column;
    align-items: flex-end;
    gap: 4px;
    opacity: 0;
    animation: appear 0.8s ease forwards 0.7s;
  }

  .cw-logo {
    font-family: var(--fd);
    font-size: 30px;
    letter-spacing: 3px;
    line-height: 1;
    text-shadow: 0 0 18px rgba(0,255,136,0.55), 0 2px 8px rgba(0,0,0,0.8);
  }
  .cw-logo .g { color: var(--gs-green); }   /* GREENS — primary green */
  .cw-logo .s { color: var(--gs-text); }    /* SCREENS — off-white   */
  .cw-logo .e { color: var(--gs-green); }   /* ENT — primary green   */

  .cw-line {
    width: 100%;
    height: 1px;
    background: linear-gradient(to left, var(--gs-green), transparent);
  }

  .cw-sub {
    font-family: var(--fm);
    font-size: 11px;
    letter-spacing: 2.5px;
    color: var(--gs-muted);
    text-shadow: 0 1px 6px rgba(0,0,0,0.9);
  }

  /* =============================================
     CONTROL PANEL — hidden in OBS with ?obs=1
  ============================================= */
  .ctrl-tab {
    position: fixed;
    bottom: 60px;
    left: 44px;
    z-index: 9999;
  }
  .ctrl-panel {
    background: rgba(5,10,7,0.95);
    border: 1px solid var(--gs-border);
    padding: 24px 18px;
    display: flex;
    flex-direction: column;
    gap: 12px;
    min-width: 220px;
    border-radius: 6px;
    box-shadow: 0 0 24px rgba(0,255,136,0.08);
  }
  .ctrl-title {
    font-family: var(--fm);
    font-size: 10px;
    letter-spacing: 2.5px;
    color: var(--gs-muted);
    text-transform: uppercase;
    padding-bottom: 10px;
    border-bottom: 1px solid var(--gs-border);
  }
  .demo-btn {
    background: transparent;
    border: 1px solid var(--gs-border);
    color: var(--gs-green);
    font-family: var(--fm);
    font-size: 11px;
    letter-spacing: 2px;
    padding: 9px 16px;
    cursor: pointer;
    text-transform: uppercase;
    transition: all 0.2s;
    clip-path: polygon(6px 0%, 100% 0%, calc(100% - 6px) 100%, 0% 100%);
    width: 100%;
    text-align: left;
  }
  .demo-btn:hover { background: rgba(0,255,136,0.1); border-color: var(--gs-green); }
  .demo-btn.active { background: var(--gs-green); color: var(--gs-dark); border-color: var(--gs-green); }
</style>
</head>
<body class="live-off">

<!-- TOP LEFT: LIVE + GREENS.SCREENS -->
<div class="brand-unit">
  <div class="live-badge"><span class="live-dot"></span>LIVE</div>
  <div class="brand-logo"><span class="h">GREENS</span>.SCREENS</div>
</div>

<!-- TOP RIGHT: GSE ENT WATERMARK -->
<div class="corner-watermark">
  <div class="cw-logo"><span class="g">GREENS</span><span class="s"> SCREENS</span><span class="e"> ENT</span></div>
  <div class="cw-line"></div>
  <div class="cw-sub">greensscreensent.com</div>
</div>

<!-- CONTROLS -->
<div class="ctrl-tab" id="ctrl-tab">
  <div class="ctrl-panel">
    <div class="ctrl-title">GSE Overlay Controls</div>
    <button class="demo-btn" id="btn-live" onclick="toggleLive()">○ LIVE Badge: OFF</button>
  </div>
</div>

<script>
  const params = new URLSearchParams(location.search);

  function toggleLive() {
    const off = document.body.classList.toggle('live-off');
    const btn = document.getElementById('btn-live');
    btn.classList.toggle('active', !off);
    btn.textContent = off ? '○ LIVE Badge: OFF' : '● LIVE Badge: ON';
  }

  /* URL params:
     ?live=1   start with LIVE badge ON (for streams)
     ?obs=1    hide control panel (use in OBS)
     ?demo=1   fake gameplay background (preview only)
  */
  if (params.get('live') === '1') toggleLive();
  if (params.get('obs') === '1') document.getElementById('ctrl-tab').style.display = 'none';
  if (params.get('demo') === '1') document.body.classList.add('demo');

  /*
    OBS SETUP:
    - Add Browser Source → Local file: this HTML
    - Width: 1080, Height: 1920
    - Recorded sessions:  ?obs=1            (logos only)
    - Live streams:       ?obs=1&live=1     (pulsing LIVE badge on)
    - Or toggle mid-session: right-click source → Interact → click the button
  */
</script>
</body>
</html>
